name: agent-qa-mobile

defaults:
  tools:
    node: "24"

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

on:
  pull_request:
    branches:
      - "*"

jobs:
  fingerprint:
    name: Calculate mobile fingerprints
    type: fingerprint
    environment: preview

  android_get_build:
    name: Find reusable Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: qa-release
      distribution: internal
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      wait_for_in_progress: true

  android_repack:
    name: Repack Android build
    needs: [android_get_build]
    if: ${{ needs.android_get_build.outputs.build_id }}
    type: repack
    params:
      build_id: ${{ needs.android_get_build.outputs.build_id }}
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} Android agent QA repack"

  android_build:
    name: Build Android app
    needs: [android_get_build]
    if: ${{ !needs.android_get_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} Android agent QA build"

  ios_get_build:
    name: Find reusable iOS simulator build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      profile: qa-ios-simulator
      simulator: true
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      wait_for_in_progress: true

  ios_repack:
    name: Repack iOS simulator build
    needs: [ios_get_build]
    if: ${{ needs.ios_get_build.outputs.build_id }}
    type: repack
    params:
      build_id: ${{ needs.ios_get_build.outputs.build_id }}
      profile: qa-ios-simulator
      message: "PR #${{ github.event.pull_request.number }} iOS agent QA repack"

  ios_build:
    name: Build iOS simulator app
    needs: [ios_get_build]
    if: ${{ !needs.ios_get_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: qa-ios-simulator
      message: "PR #${{ github.event.pull_request.number }} iOS agent QA build"

  qa_android:
    name: Android agent-device QA
    after: [android_repack, android_build]
    if: ${{ after.android_repack.status == 'success' || after.android_build.status == 'success' }}
    environment: preview
    runs_on: linux-medium-nested-virtualization
    outputs:
      report_b64: ${{ steps.capture_qa_outputs.outputs.report_b64 }}
    env:
      BUILD_ID: ${{ after.android_repack.outputs.build_id || after.android_build.outputs.build_id }}
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      WORKFLOW_URL: ${{ workflow.url }}
      QA_MODEL: openai/gpt-5.4-mini
      QA_PLATFORM: android
      APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_ANDROID_DEVICE: ci-android
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: install_agent_device
        run: |
          npm install -g agent-device@latest cali@0.4.0-5
      - id: install_agent_device_skill
        run: |
          npx skills add callstackincubator/agent-device --agent codex --skill agent-device -y
      - uses: eas/download_build
        id: download_build
        with:
          build_id: ${{ env.BUILD_ID }}
          extensions: [apk]
      - id: provision_android_emulator
        run: |
          bash ./scripts/agent-qa/provision-android-emulator.sh
      - id: run_agent_qa
        run: |
          bash ./scripts/agent-qa/run-and-export.sh "${{ steps.download_build.outputs.artifact_path }}" || true
      - id: capture_qa_outputs
        run: |
          set-output report_b64 "$(base64 < artifacts/qa/report.json | tr -d '\n')"

  qa_ios:
    name: iOS agent-device QA
    after: [ios_repack, ios_build]
    if: ${{ after.ios_repack.status == 'success' || after.ios_build.status == 'success' }}
    environment: preview
    runs_on: macos-medium
    outputs:
      report_b64: ${{ steps.capture_qa_outputs.outputs.report_b64 }}
    env:
      BUILD_ID: ${{ after.ios_repack.outputs.build_id || after.ios_build.outputs.build_id }}
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      WORKFLOW_URL: ${{ workflow.url }}
      QA_MODEL: openai/gpt-5.4-mini
      QA_PLATFORM: ios
      APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_IOS_DEVICE: iPhone 17
      AGENT_DEVICE_DAEMON_TIMEOUT_MS: "180000"
      AGENT_DEVICE_IOS_BOOT_TIMEOUT_MS: "180000"
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: install_agent_device
        run: |
          npm install -g agent-device@latest cali@0.4.0-5
      - id: install_agent_device_skill
        run: |
          npx skills add callstackincubator/agent-device --agent codex --skill agent-device -y
      - uses: eas/download_build
        id: download_build
        with:
          build_id: ${{ env.BUILD_ID }}
          extensions: [app]
      - id: run_agent_qa
        run: |
          bash ./scripts/agent-qa/run-and-export.sh "${{ steps.download_build.outputs.artifact_path }}" || true
      - id: capture_qa_outputs
        run: |
          set-output report_b64 "$(base64 < artifacts/qa/report.json | tr -d '\n')"

  compose_comment:
    name: Compose PR comment
    after: [qa_android, qa_ios]
    if: ${{ always() }}
    environment: preview
    runs_on: linux-medium
    outputs:
      payload: ${{ steps.compose.outputs.payload }}
    steps:
      - uses: eas/checkout
      - id: install_cali
        run: |
          npm install -g cali@0.4.0-5
      - id: compose
        env:
          ANDROID_REPORT_B64: ${{ after.qa_android.outputs.report_b64 || '' }}
          IOS_REPORT_B64: ${{ after.qa_ios.outputs.report_b64 || '' }}
        run: |
          mkdir -p artifacts/android artifacts/ios artifacts/combined-comment
          EXPORT_ARGS=()
          if [ -n "${ANDROID_REPORT_B64}" ]; then
            printf '%s' "${ANDROID_REPORT_B64}" | base64 -d > artifacts/android/report.json
            EXPORT_ARGS+=(--android artifacts/android/report.json)
          fi
          if [ -n "${IOS_REPORT_B64}" ]; then
            printf '%s' "${IOS_REPORT_B64}" | base64 -d > artifacts/ios/report.json
            EXPORT_ARGS+=(--ios artifacts/ios/report.json)
          fi
          if [ "${#EXPORT_ARGS[@]}" -eq 0 ]; then
            printf 'Agent QA comment was not produced.\n' > artifacts/combined-comment/ci-comment.md
          else
            cali export-ci "${EXPORT_ARGS[@]}" --output-dir artifacts/combined-comment
          fi
          set-output payload "$(cat artifacts/combined-comment/ci-comment.md)"

  qa_comment:
    name: Comment on PR
    after: [compose_comment]
    if: ${{ always() && github.event_name == 'pull_request' }}
    type: github-comment
    params:
      payload: ${{ after.compose_comment.outputs.payload || 'Agent QA comment was not produced.' }}
