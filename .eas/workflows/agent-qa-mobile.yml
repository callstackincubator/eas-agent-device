name: agent-qa-mobile

defaults:
  tools:
    node: "24"

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

on:
  pull_request:
    branches:
      - "*"

jobs:
  fingerprint:
    name: Calculate mobile fingerprints
    type: fingerprint
    environment: preview

  android_get_build:
    name: Find reusable Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: qa-release
      distribution: internal
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      wait_for_in_progress: true

  android_repack:
    name: Repack Android build
    needs: [android_get_build]
    if: ${{ needs.android_get_build.outputs.build_id }}
    type: repack
    params:
      build_id: ${{ needs.android_get_build.outputs.build_id }}
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} Android agent QA repack"

  android_build:
    name: Build Android app
    needs: [android_get_build]
    if: ${{ !needs.android_get_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} Android agent QA build"

  ios_get_build:
    name: Find reusable iOS simulator build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      profile: qa-ios-simulator
      simulator: true
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      wait_for_in_progress: true

  ios_repack:
    name: Repack iOS simulator build
    needs: [ios_get_build]
    if: ${{ needs.ios_get_build.outputs.build_id }}
    type: repack
    params:
      build_id: ${{ needs.ios_get_build.outputs.build_id }}
      profile: qa-ios-simulator
      message: "PR #${{ github.event.pull_request.number }} iOS agent QA repack"

  ios_build:
    name: Build iOS simulator app
    needs: [ios_get_build]
    if: ${{ !needs.ios_get_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: qa-ios-simulator
      message: "PR #${{ github.event.pull_request.number }} iOS agent QA build"

  qa_android:
    name: Android agent-device QA
    after: [android_repack, android_build]
    if: ${{ after.android_repack.status == 'success' || after.android_build.status == 'success' }}
    environment: preview
    runs_on: linux-medium-nested-virtualization
    outputs:
      status: ${{ steps.run_agent_qa.outputs.status }}
      status_label: ${{ steps.run_agent_qa.outputs.status_label }}
      top_issue: ${{ steps.run_agent_qa.outputs.top_issue }}
      screenshots_json: ${{ steps.run_agent_qa.outputs.screenshots_json }}
      section_body: ${{ steps.run_agent_qa.outputs.section_body }}
    env:
      BUILD_ID: ${{ after.android_repack.outputs.build_id || after.android_build.outputs.build_id }}
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      WORKFLOW_URL: ${{ workflow.url }}
      QA_MODEL: openai/gpt-5.4-mini
      QA_PLATFORM: android
      APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_ANDROID_DEVICE: ci-android
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: install_agent_device
        run: |
          npm install -g agent-device@0.10.1
      - uses: eas/download_build
        id: download_build
        with:
          build_id: ${{ env.BUILD_ID }}
          extensions: [apk]
      - id: provision_android_emulator
        run: |
          bash ./scripts/agent-qa/provision-android-emulator.sh
      - id: run_agent_qa
        env:
          AGENT_DEVICE_SESSION: qa-android
          AGENT_DEVICE_PLATFORM: android
          AGENT_DEVICE_SESSION_LOCK: strip
        run: |
          bash ./scripts/agent-qa/run-and-export.sh "${{ steps.download_build.outputs.artifact_path }}"

  qa_ios:
    name: iOS agent-device QA
    after: [ios_repack, ios_build]
    if: ${{ after.ios_repack.status == 'success' || after.ios_build.status == 'success' }}
    environment: preview
    runs_on: macos-medium
    outputs:
      status: ${{ steps.run_agent_qa.outputs.status }}
      status_label: ${{ steps.run_agent_qa.outputs.status_label }}
      top_issue: ${{ steps.run_agent_qa.outputs.top_issue }}
      screenshots_json: ${{ steps.run_agent_qa.outputs.screenshots_json }}
      section_body: ${{ steps.run_agent_qa.outputs.section_body }}
    env:
      BUILD_ID: ${{ after.ios_repack.outputs.build_id || after.ios_build.outputs.build_id }}
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      WORKFLOW_URL: ${{ workflow.url }}
      QA_MODEL: openai/gpt-5.4-mini
      QA_PLATFORM: ios
      APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_IOS_DEVICE: iPhone 17
      AGENT_DEVICE_DAEMON_TIMEOUT_MS: "180000"
      AGENT_DEVICE_IOS_BOOT_TIMEOUT_MS: "180000"
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - id: install_agent_device
        run: |
          npm install -g agent-device@0.10.1
      - uses: eas/download_build
        id: download_build
        with:
          build_id: ${{ env.BUILD_ID }}
          extensions: [app]
      - id: provision_ios_simulator
        run: |
          bash ./scripts/agent-qa/provision-ios-simulator.sh
      - id: run_agent_qa
        env:
          AGENT_DEVICE_SESSION: qa-ios
          AGENT_DEVICE_PLATFORM: ios
          AGENT_DEVICE_SESSION_LOCK: strip
        run: |
          bash ./scripts/agent-qa/run-and-export.sh "${{ steps.download_build.outputs.artifact_path }}"

  combine_comment:
    name: Combine mobile QA comment
    after: [qa_android, qa_ios]
    if: ${{ always() && github.event_name == 'pull_request' }}
    outputs:
      comment_body: ${{ steps.compose_comment.outputs.comment_body }}
    steps:
      - id: compose_comment
        env:
          ANDROID_STATUS_LABEL: ${{ after.qa_android.outputs.status_label || '⛔ blocked' }}
          IOS_STATUS_LABEL: ${{ after.qa_ios.outputs.status_label || '⛔ blocked' }}
          ANDROID_TOP_ISSUE: ${{ after.qa_android.outputs.top_issue || 'No Android QA report was produced.' }}
          IOS_TOP_ISSUE: ${{ after.qa_ios.outputs.top_issue || 'No iOS QA report was produced.' }}
          ANDROID_SECTION_BODY: ${{ after.qa_android.outputs.section_body || '### Android\n\n**Status:** ⛔ blocked\n\nNo Android QA section was produced.\n' }}
          IOS_SECTION_BODY: ${{ after.qa_ios.outputs.section_body || '### iOS\n\n**Status:** ⛔ blocked\n\nNo iOS QA section was produced.\n' }}
        run: |
          cat > android-screenshots.json <<'EOF'
          ${{ after.qa_android.outputs.screenshots_json || '[]' }}
          EOF

          cat > ios-screenshots.json <<'EOF'
          ${{ after.qa_ios.outputs.screenshots_json || '[]' }}
          EOF

          node --input-type=module <<'EOF' > combined-comment.md
          import fs from 'node:fs';

          const androidScreenshots = JSON.parse(fs.readFileSync('android-screenshots.json', 'utf8'));
          const iosScreenshots = JSON.parse(fs.readFileSync('ios-screenshots.json', 'utf8'));

          const clean = (value) => String(value || '').replace(/\s+/g, ' ').trim();
          const escapePipe = (value) => clean(value).replace(/\|/g, '\\|');
          const renderCell = (screenshot) => {
            if (!screenshot) {
              return 'N/A';
            }
            const label = escapePipe(screenshot.label || screenshot.fileName || 'Screenshot');
            if (screenshot.blobUrl) {
              return `**${label}**<br><a href="${screenshot.blobUrl}"><img src="${screenshot.blobUrl}" alt="${label}" height="500" /></a>`;
            }
            const bytes = typeof screenshot.bytes === 'number' ? `${screenshot.bytes} bytes` : 'local file';
            return `**${label}**<br>${escapePipe(screenshot.fileName || 'Screenshot')} (${bytes})`;
          };

          const screenshotRowCount = Math.max(androidScreenshots.length, iosScreenshots.length, 1);
          const screenshotRows = [];
          for (let index = 0; index < screenshotRowCount; index += 1) {
            screenshotRows.push(
              `| ${renderCell(androidScreenshots[index])} | ${renderCell(iosScreenshots[index])} |`,
            );
          }

          const lines = [
            '## Agent QA',
            '',
            '| Platform | Status | Issues |',
            '| --- | --- | --- |',
            `| Android | ${escapePipe(process.env.ANDROID_STATUS_LABEL)} | ${escapePipe(process.env.ANDROID_TOP_ISSUE)} |`,
            `| iOS | ${escapePipe(process.env.IOS_STATUS_LABEL)} | ${escapePipe(process.env.IOS_TOP_ISSUE)} |`,
            '',
            '### Screenshots',
            '',
            '| Android | iOS |',
            '| --- | --- |',
            ...screenshotRows,
            '',
            '<details>',
            '<summary>Full Android Report</summary>',
            '',
            process.env.ANDROID_SECTION_BODY || '### Android\n\n**Status:** ⛔ blocked\n\nNo Android QA section was produced.\n',
            '</details>',
            '',
            '<details>',
            '<summary>Full iOS Report</summary>',
            '',
            process.env.IOS_SECTION_BODY || '### iOS\n\n**Status:** ⛔ blocked\n\nNo iOS QA section was produced.\n',
            '</details>',
            '',
          ];

          process.stdout.write(lines.join('\n'));
          EOF

          COMMENT_BODY="$(cat combined-comment.md)"
          set-output comment_body "$COMMENT_BODY"

  qa_comment:
    name: Comment on PR
    after: [combine_comment]
    if: ${{ always() && github.event_name == 'pull_request' }}
    type: github-comment
    params:
      payload: |
        ${{ after.combine_comment.outputs.comment_body || '## Agent QA' }}
