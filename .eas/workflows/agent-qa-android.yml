name: agent-qa-android

defaults:
  tools:
    node: "24"

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

on:
  pull_request:
    branches:
      - "*"

jobs:
  fingerprint:
    name: Calculate Android fingerprint
    type: fingerprint
    environment: preview

  android_get_build:
    name: Find reusable Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: qa-release
      distribution: internal
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}
      wait_for_in_progress: true

  android_repack:
    name: Repack Android build
    needs: [android_get_build]
    if: ${{ needs.android_get_build.outputs.build_id }}
    type: repack
    params:
      build_id: ${{ needs.android_get_build.outputs.build_id }}
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} agent QA repack"

  android_build:
    name: Build Android app
    needs: [android_get_build]
    if: ${{ !needs.android_get_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: qa-release
      message: "PR #${{ github.event.pull_request.number }} agent QA build"

  qa_android:
    name: Agent-device QA
    after: [android_repack, android_build]
    if: ${{ after.android_repack.status == 'success' || after.android_build.status == 'success' }}
    environment: preview
    runs_on: linux-medium-nested-virtualization
    outputs:
      comment_body: ${{ steps.run_agent_qa.outputs.comment_body }}
      build_id: ${{ steps.run_agent_qa.outputs.build_id }}
    env:
      BUILD_ID: ${{ after.android_repack.outputs.build_id || after.android_build.outputs.build_id }}
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      WORKFLOW_URL: ${{ workflow.url }}
      ANDROID_APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_SESSION: qa-android
      AGENT_DEVICE_PLATFORM: android
      QA_MODEL: openai/gpt-5.1-mini
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - uses: eas/download_build
        id: download_build
        with:
          build_id: ${{ env.BUILD_ID }}
          extensions: [apk]
      - id: debug_agent_device
        run: |
          node -v
          npx agent-device --version
          npx agent-device devices --platform android || true
      - id: run_agent_qa
        run: |
          set +e
          export APK_PATH="${{ steps.download_build.outputs.artifact_path }}"
          npm run agent-qa
          EXIT_CODE=$?

          if [ -f artifacts/qa/comment.md ]; then
            COMMENT_BODY="$(cat artifacts/qa/comment.md)"
          else
            COMMENT_BODY=$'## Agent QA\n\nThe QA runner did not produce a markdown report.\n\n- Build ID: '"${BUILD_ID}"$'\n- Workflow: '"${WORKFLOW_URL}"
          fi

          set-output comment_body "$COMMENT_BODY"
          set-output build_id "$BUILD_ID"
          exit $EXIT_CODE

  qa_comment:
    name: Comment on PR
    after: [qa_android]
    if: ${{ github.event_name == 'pull_request' }}
    type: github-comment
    params:
      payload: |
        ${{ after.qa_android.outputs.comment_body || '## Agent QA' }}

        Workflow: ${{ workflow.url }}
