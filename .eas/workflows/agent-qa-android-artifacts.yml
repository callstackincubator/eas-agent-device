name: agent-qa-android-artifacts

defaults:
  tools:
    node: "24"

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

on:
  pull_request:
    branches:
      - "*"

jobs:
  qa_android_build:
    name: Build and run agent QA
    type: build
    params:
      platform: android
      profile: qa-agent
      message: "PR #${{ github.event.pull_request.number }} agent QA build with artifacts"
    env:
      PR_JSON: ${{ toJSON(github.event.pull_request) }}
      ANDROID_APPLICATION_ID: dev.expo.easagentdevice
      AGENT_DEVICE_ANDROID_DEVICE: ci-android
      QA_MODEL: openai/gpt-5-mini

  qa_prepare_comment:
    name: Prepare PR comment
    after: [qa_android_build]
    if: ${{ after.qa_android_build.status == 'success' }}
    outputs:
      comment_body: ${{ steps.extract_comment.outputs.comment_body }}
    steps:
      - uses: eas/download_artifact
        id: download_qa_artifacts
        with:
          name: Upload QA artifacts
      - id: extract_comment
        run: |
          set -euo pipefail

          artifact_path="${{ steps.download_qa_artifacts.outputs.artifact_path }}"
          extract_dir="$(mktemp -d)"

          if [ -d "$artifact_path" ]; then
            cp -R "$artifact_path"/. "$extract_dir"/
          elif [[ "$artifact_path" == *.zip ]]; then
            unzip -q "$artifact_path" -d "$extract_dir"
          elif [[ "$artifact_path" == *.tar.gz || "$artifact_path" == *.tgz ]]; then
            tar -xzf "$artifact_path" -C "$extract_dir"
          else
            cp "$artifact_path" "$extract_dir"/
          fi

          comment_file="$(find "$extract_dir" -name comment.md | head -n 1)"

          if [ -n "$comment_file" ] && [ -f "$comment_file" ]; then
            comment_body="$(cat "$comment_file")"
          else
            comment_body=$'## Agent QA\n\nThe QA artifact bundle did not contain comment.md.'
          fi

          set-output comment_body "$comment_body"

  qa_comment_success:
    name: Comment on PR
    after: [qa_prepare_comment]
    if: ${{ github.event_name == 'pull_request' }}
    type: github-comment
    params:
      payload: |
        ${{ after.qa_prepare_comment.outputs.comment_body }}

        Build: ${{ after.qa_android_build.outputs.build_id || 'n/a' }}
        Workflow: ${{ workflow.url }}

  qa_comment_failure:
    name: Comment on PR when build fails
    after: [qa_android_build]
    if: ${{ github.event_name == 'pull_request' && after.qa_android_build.status == 'failure' }}
    type: github-comment
    params:
      payload: |
        ## Agent QA

        The custom build failed before the QA artifact bundle could be downloaded.

        Build: ${{ after.qa_android_build.outputs.build_id || 'n/a' }}
        Workflow: ${{ workflow.url }}
