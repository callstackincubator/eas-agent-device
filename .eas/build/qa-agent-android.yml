build:
  name: Android agent QA with artifacts
  steps:
    - eas/build
    - run:
        name: Locate APK
        id: locate_apk
        outputs: [apk_path]
        command: |
          set -euo pipefail
          shopt -s globstar nullglob
          apk_files=(android/app/build/outputs/**/*.apk)

          if [ "${#apk_files[@]}" -eq 0 ]; then
            echo "No APK found under android/app/build/outputs"
            exit 1
          fi

          apk_path="${apk_files[0]}"
          echo "Using APK at ${apk_path}"
          set-output apk_path "${apk_path}"
    - eas/start_android_emulator:
        inputs:
          device_name: ci-android
          system_image_package: system-images;android-35;google_apis;x86_64
    - run:
        name: Run agent QA
        command: |
          set +e
          export APK_PATH='${ steps.locate_apk.apk_path }'
          export AGENT_DEVICE_SESSION=qa-android
          export AGENT_DEVICE_PLATFORM=android
          export WORKFLOW_URL='${ eas.job.expoBuildUrl }'
          npm run agent-qa
          exit_code=$?

          mkdir -p artifacts/qa

          if [ ! -f artifacts/qa/comment.md ]; then
            printf '%s\n' \
              '## Agent QA' \
              '' \
              'The QA runner did not produce a markdown report.' \
              '' \
              '- Build: ${ eas.job.expoBuildUrl }' \
              > artifacts/qa/comment.md
          fi

          if [ ! -f artifacts/qa/report.json ]; then
            printf '%s\n' \
              '{"overallStatus":"blocked","summary":"The QA runner did not produce a JSON report."}' \
              > artifacts/qa/report.json
          fi

          exit "$exit_code"
    - eas/upload_artifact:
        name: Upload QA artifacts
        if: ${ always() }
        inputs:
          type: build-artifact
          path: artifacts/qa
